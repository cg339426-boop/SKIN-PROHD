<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Impact', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* TEXTURA DE LÁMINA ESTRIADA METALIZADA CON LUZ NEÓN */
        body {
            background: 
                linear-gradient(27deg, #121212 5px, transparent 5px) 0 5px,
                linear-gradient(207deg, #121212 5px, transparent 5px) 10px 0,

                linear-gradient(207deg, #1e1e1e 5px, transparent 5px) 10px 5px,

            background-size: 20px 20px;
            background-color: #151515;
            color: #ffffff;
            padding-bottom: 90px; 
        }

        header {
            background: linear-gradient(180deg, #0a0a0a 0%, #151515 100%);
            padding: 30px 15px;
            text-align: center;
            border-bottom: 4px solid #00ff66;
            box-shadow: 0 0 20px #00ff6655, inset 0 -5px 15px rgba(0,0,0,0.9);
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 42px;
            letter-spacing: 3px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            text-shadow: 
                0 1px 0 #cccccc,
                0 2px 0 #c5c5c5,
                0 3px 0 #bbbbbb,
                0 4px 0 #b1b1b1,
                0 5px 0 #aaaaaa,
                0 6px 1px rgba(0,0,0,.1),
                0 0 5px rgba(0,0,0,.1),
                0 1px 3px rgba(0,0,0,.3),
                0 3px 5px rgba(0,0,0,.2),
                0 5px 10px rgba(0,0,0,.25),
                0 10px 10px rgba(0,0,0,.2),
                0 0 15px #00ff66cc;
        }

        header p {
            font-family: 'Segoe UI', sans-serif;
            font-size: 10px;
            color: #00ffff;
            margin-top: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 6px #00ffffcc;
        }

        .ads-banner {
            width: 100%;
            max-width: 468px;

            text-align: center;
            min-height: 60px;

            align-items: center;

        .ads-sticky-footer {

            box-shadow: 0 -5px 15px #00ff6633;
            text-align: center;
            padding: 5px 0;

        }

        .vista {
            display: none;
            animation: fadeIn 0.25s ease-in-out;
        }

        .vista-activa {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }

        .menu-container {

        }

            font-weight: 800;
        }

        .btn-text-cell span {

            margin-top: 2px;

        }

        .btn-arrow-cell {

        .btn-back-container {

        }

        .btn-back {

            display: inline-flex;

        .grid-skins {

        .skin-block-card {

            border-radius: 20px;

        .card-img-box {

        .card-body {

        .btn-download {

        .btn-download:active {

        }

        .contador-box {

        .contador-texto {

        }

        .contador-numero {

        #loading {

            color: #00ff66;
            font-weight: bold;
            padding: 40px;
            font-size: 18px;
            text-shadow: 0 0 10px #00ff66cc;
        }
    </style>

    <iframe id="iframeDescargaOculto" style="display:none;"></iframe>

    <script>
        // CONFIGURACIÓN DE TU BASE DE DATOS GOOGLE SHEET
        const SHEET_ID = '1OZvXWbNlcGxyeBU2soZvvSWnVNoguP17AIO20lYD0rE';
        const SHEET_TITLE = 'Hoja 1'; 
        const URL_SHEET = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_TITLE}`;

        let listaSkins = [];
        let intervalosActivos = {};

        function irAVista(idVista) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('vista-activa'));
            document.getElementById(idVista).classList.add('vista-activa');
        }

        async function cargarSkinsDesdeSheets() {
            try {
                const respuesta = await fetch(URL_SHEET);
                const textoData = await respuesta.text();
                const jsonLimpio = JSON.parse(textoData.substr(47).slice(0, -2));
                const filas = jsonLimpio.table.rows;

                listaSkins = filas.map((fila, index) => {
                    let imgMuestra = fila.c[2] ? fila.c[2].v : 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?w=600';
                    if (!imgMuestra || imgMuestra.trim() === "") {
                        imgMuestra = 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?w=600';
                    }

                    return {
                        idUnico: index,
                        camion: fila.c[0] ? fila.c[0].v : 'Modelo Base',
                        nombre: fila.c[1] ? fila.c[1].v : 'Skin Premium',
                        fotoMuestra: imgMuestra,
                        linkDescarga: fila.c[5] ? fila.c[5].v : '#', 
                        categoria: fila.c[4] ? fila.c[4].v.trim().toLowerCase() : 'otros' 
                    };
                });
                
                document.getElementById('loading').style.display = 'none';
                irAVista('vistaMenu');
            } catch (error) {
                console.error("Error cargando base de datos:", error);
                document.getElementById('loading').innerText = "ERROR EN EL SISTEMA DE DATOS.";
            }
        }

        cargarSkinsDesdeSheets();

        function mostrarCategoria(catSeleccionada) {
            const contenedor = document.getElementById('listaSkinsContenedor');
            contenedor.innerHTML = ''; 
            
            for (let id in intervalosActivos) {
                clearInterval(intervalosActivos[id]);
            }
            intervalosActivos = {};

            const skinsFiltradas = listaSkins.filter(skin => skin.categoria === catSeleccionada);

            if(skinsFiltradas.length === 0) {
                contenedor.innerHTML = `<div style="text-align:center; padding:50px; color:#aaa; font-family:'Segoe UI',sans-serif; font-size:14px;">PRÓXIMAMENTE NUEVAS SKINS PARA ESTE MODELO...</div>`;
                irAVista('vistaCategoria');
                return;
            }

            skinsFiltradas.forEach((skin) => {
                const cardHTML = `
                    <div class="skin-block-card">
                        <div class="card-img-box">
                            <img src="${skin.fotoMuestra}" alt="Camion Skin" onerror="this.src='https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?w=600'">
                        </div>
                        <div class="card-body">
                            <h3>${skin.nombre}</h3>
                            <p>COMPATIBLE CON: ${skin.camion}</p>
                            
                            <button class="btn-download" id="btnDescarga_${skin.idUnico}" onclick="iniciarContadorCard('${skin.linkDescarga}', ${skin.idUnico})">
                                DESCARGAR AHORA
                            </button>

                            <div class="contador-box" id="cajaContador_${skin.idUnico}">
                                <div id="cuerpoMensaje_${skin.idUnico}">
                                    <p class="contador-texto">
                                        Abriendo servidor seguro... Mantén la pestaña abierta.<br>
                                        Cargando enlaces en <span class="contador-numero" id="segundosAviso_${skin.idUnico}">6</span> segundos.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += cardHTML;
            });

            irAVista('vistaCategoria');
        }

        function iniciarContadorCard(urlDescarga, idUnico) {
            const boton = document.getElementById(`btnDescarga_${idUnico}`);
            const cajaContador = document.getElementById(`cajaContador_${idUnico}`);
            const cuerpoMensaje = document.getElementById(`cuerpoMensaje_${idUnico}`);
            
            cuerpoMensaje.innerHTML = `
                <p class="contador-texto">
                    Abriendo servidor seguro... Mantén la pestaña abierta.<br>
                    Cargando enlaces en <span class="contador-numero" id="segundosAviso_${idUnico}">6</span> segundos.
                </p>
            `;

            if (boton) {
                boton.style.display = 'none';
            }
            cajaContador.style.display = 'block'; 
            
            const urlAnuncio = 'https://www.effectivecpmnetwork.com/p2y3r3phx?key=0a9217a59faa68685a1f87c8ae5fc3ea';
            const ventanaAnuncio = window.open(urlAnuncio, '_blank'); 

            let tiempoRestante = 6;

            intervalosActivos[idUnico] = setInterval(() => {
                tiempoRestante--;
                
                const numeroActualizado = document.getElementById(`segundosAviso_${idUnico}`);
                if (numeroActualizado) {
                    numeroActualizado.innerText = tiempoRestante;
                }

                if (ventanaAnuncio && ventanaAnuncio.closed && tiempoRestante > 0) {
                    clearInterval(intervalosActivos[idUnico]);
                    cuerpoMensaje.innerHTML = `
                        <span class="material-icons" style="color:#ff3333; font-size:28px;">error_outline</span><br>
                        <span style="color:#ff3333; font-weight:bold; font-size:14px;">¡VERIFICACIÓN FALLIDA!</span><br>
                        <p class="contador-texto" style="margin-bottom:8px;">Debes interactuar con el servidor publicitario por 6 segundos.</p>
                        <button class="btn-download" style="padding:10px; font-size:13px; background: linear-gradient(180deg, #00ff66 0%, #00b347 100%); color:#000; border-bottom:3px solid #008033;" onclick="reintentarFlujoCard('${urlDescarga}', ${idUnico})">REINTENTAR DESCARGA</button>
                    `;
                    return;
                }

                if (tiempoRestante <= 0) {
                    clearInterval(intervalosActivos[idUnico]);
                    document.getElementById('iframeDescargaOculto').src = urlDescarga;
                    cuerpoMensaje.innerHTML = `
                        <span class="material-icons" style="color:#00ff00; font-size:28px;">check_circle</span><br>
                        <p style="color: #00ff00; font-weight: bold; font-size:15px; letter-spacing:1px;">DESCARGA INICIADA</p>
                        <p class="contador-texto">El archivo de textura HD se está guardando.</p>
                    `;
                }
            }, 1000);
        }

        function reintentarFlujoCard(urlDescarga, idUnico) {
            const cajaContador = document.getElementById(`cajaContador_${idUnico}`);
            cajaContador.style.display = 'none';
            setTimeout(() => {
                iniciarContadorCard(urlDescarga, idUnico);
            }, 150);
        }
    </script>
