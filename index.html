<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKINS PRO</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Impact', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* TEXTURA DE LÁMINA ESTRIADA METALIZADA */
        body {
            background: 
                linear-gradient(27deg, #121212 5px, transparent 5px) 0 5px,
                linear-gradient(207deg, #121212 5px, transparent 5px) 10px 0,
                linear-gradient(27deg, #1e1e1e 5px, transparent 5px) 0 10px,
                linear-gradient(207deg, #1e1e1e 5px, transparent 5px) 10px 5px,
                linear-gradient(90deg, #171717 10px, transparent 10px),
                linear-gradient(#181818 25%, #151515 25%, #151515 50%, transparent 50%, transparent 75%, #202020 75%, #202020);
            background-size: 20px 20px;
            background-color: #151515;
            color: #ffffff;
            padding-bottom: 90px; 
        }

        header {
            background: linear-gradient(180deg, #0a0a0a 0%, #151515 100%);
            padding: 30px 15px;
            text-align: center;
            border-bottom: 4px solid #00ff66;
            box-shadow: 0 0 20px #00ff6655, inset 0 -5px 15px rgba(0,0,0,0.9);
            margin-bottom: 25px;
        }

        /* LOGO TIPO 3D CON CORTE Y NEÓN VERDE */
        header h1 {
            font-size: 42px;
            letter-spacing: 3px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            /* Efecto de relieve 3D con sombras multi-capa */
            text-shadow: 
                0 1px 0 #cccccc,
                0 2px 0 #c5c5c5,
                0 3px 0 #bbbbbb,
                0 4px 0 #b1b1b1,
                0 5px 0 #aaaaaa,
                0 6px 1px rgba(0,0,0,.1),
                0 0 5px rgba(0,0,0,.1),
                0 1px 3px rgba(0,0,0,.3),
                0 3px 5px rgba(0,0,0,.2),
                0 5px 10px rgba(0,0,0,.25),
                0 10px 10px rgba(0,0,0,.2),
                0 0 15px #00ff66cc; /* Destello Neón Trasero */
        }

        header p {
            font-family: 'Segoe UI', sans-serif;
            font-size: 10px;
            color: #00ffff;
            margin-top: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 6px #00ffffcc;
        }

        .ads-banner {
            width: 100%;
            max-width: 468px;
            margin: 15px auto;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ads-sticky-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #050505;
            border-top: 3px solid #00ff66;
            box-shadow: 0 -5px 15px #00ff6633;
            text-align: center;
            padding: 5px 0;
            z-index: 9999;
        }

        .vista {
            display: none;
            animation: fadeIn 0.25s ease-in-out;
        }

        .vista-activa {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .menu-container {
            display: block;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* BOTONES DEL TABLERO EN VERDE NEÓN Y RELIEVE 3D */
        .menu-btn {
            display: block;
            width: 100%;
            background: linear-gradient(180deg, #2a2a2a 0%, #121212 100%);
            color: #ffffff;
            border: 2px solid #00ff66;
            border-radius: 30px;
            padding: 14px 24px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 18px;
            text-align: left;
            position: relative;
            /* Relieve mecánico inferior */
            border-bottom: 6px solid #00b347;
            box-shadow: 0 0 12px #00ff6622, 0 6px 10px rgba(0,0,0,0.7);
            transition: all 0.1s ease;
        }

        .menu-btn:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
            box-shadow: 0 0 8px #00ff6644, 0 2px 4px rgba(0,0,0,0.9);
        }

        .btn-content-flex {
            display: table;
            width: 100%;
        }

        .btn-icon-cell {
            display: table-cell;
            vertical-align: middle;
            width: 35px;
            color: #00ff66;
            text-shadow: 0 0 8px #00ff66;
        }

        .btn-text-cell {
            display: table-cell;
            vertical-align: middle;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 800;
        }

        .btn-text-cell span {
            font-size: 11px;
            color: #00ffff;
            display: block;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            margin-top: 2px;
            text-shadow: 0 0 4px #00ffff99;
        }

        .btn-arrow-cell {
            display: table-cell;
            vertical-align: middle;
            text-align: right;
            width: 25px;
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
        }

        .btn-back-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 15px 15px 15px;
        }

        .btn-back {
            background-color: #0a0a0a;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 8px #00ffff33;
            font-family: 'Segoe UI', sans-serif;
        }

        .grid-skins {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* TARJETAS DE SKINS */
        .skin-item-card {
            background: linear-gradient(180deg, #222 0%, #111 100%);
            border: 2px solid #252525;
            border-radius: 16px;
            display: table;
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }
        
        .skin-item-card:active {
            border-color: #00ff66;
            box-shadow: 0 0 10px #00ff6644;
        }

        .thumb-cell {
            display: table-cell;
            vertical-align: middle;
            width: 100px;
        }

        .skin-item-thumb {
            width: 90px;
            height: 65px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 8px;
            object-fit: cover;
        }

        .info-cell {
            display: table-cell;
            vertical-align: middle;
            padding-left: 10px;
            font-family: 'Segoe UI', sans-serif;
        }

        .info-cell h4 {
            font-size: 16px;
            color: #fff;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .info-cell p {
            font-size: 11px;
            color: #00ff66;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detalle-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .detalle-card {
            background-color: #0f0f0f;
            border: 2px solid #00ff66;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px #00ff6622, 0 10px 20px rgba(0,0,0,0.8);
        }

        .detalle-img-box {
            width: 100%;
            height: 230px;
            background-color: #000;
            border-bottom: 2px solid #1a1a1a;
        }

        .detalle-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detalle-info {
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        .detalle-info h2 {
            font-size: 22px;
            color: #fff;
            margin-bottom: 6px;
            font-weight: 800;
        }

        .detalle-info p {
            font-size: 13px;
            color: #00ffff;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffff33;
        }

        /* BOTÓN DE DESCARGA EN CAMPO VERDE NEÓN ACCIONABLE */
        .btn-download {
            background: linear-gradient(180deg, #00ff66 0%, #00b347 100%);
            color: #000000;
            border: none;
            border-bottom: 5px solid #008033;
            padding: 16px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 1px;
            text-align: center;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 0 15px #00ff6634;
            display: block;
            transition: all 0.1s ease;
        }

        .btn-download:active {
            border-bottom-width: 1px;
            transform: translateY(4px);
        }

        .contador-box {
            background-color: #050505;
            border: 2px dashed #00ff66;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-top: 15px;
            display: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9);
        }

        .contador-texto {
            font-size: 13px;
            color: #fff;
            line-height: 1.5;
        }

        .contador-numero {
            font-size: 24px;
            font-weight: 900;
            color: #00ff66;
            text-shadow: 0 0 8px #00ff66;
        }

        #loading {
            text-align: center;
            color: #00ff66;
            font-weight: bold;
            padding: 40px;
            font-size: 18px;
            text-shadow: 0 0 10px #00ff66cc;
        }
    </style>
</head>
<body>

    <header>
        <h1>SKINS PRO</h1>
        <p>CONCESIONARIO OFICIAL TOE3</p>
    </header>

    <div id="loading">INYECTANDO NITRÓGENO AL MOTOR...</div>

    <!-- VISTA 1: MENÚ CON AMBOS NOMBRES OPTIMIZADOS -->
    <div id="vistaMenu" class="vista">
        <div class="menu-container">

            <button class="menu-btn" onclick="mostrarCategoria('iva_sway')">

        </div>

        <div class="ads-banner">

                atOptions = {

                };

    <!-- VISTA 2: LISTADO DE TEXTURAS -->
    <div id="vistaCategoria" class="vista">
        <div class="btn-back-container">
            <button class="btn-back" onclick="irAVista('vistaMenu')">
                <span class="material-icons">arrow_back</span> ATRÁS
            </button>
        </div>

        <div class="grid-skins" id="listaSkinsContenedor"></div>
        
        <div class="ads-banner">
            <script>
                atOptions = {
                    'key' : '20622febebc58aceaadca806e30f7816',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/20622febebc58aceaadca806e30f7816/invoke.js"></script>
        </div>
    </div>

    <!-- VISTA 3: DETALLE Y FLUJO ANTITRAMPA -->
    <div id="vistaDetalle" class="vista">
        <div class="btn-back-container">
            <button class="btn-back" id="btnVolverCat">
                <span class="material-icons">arrow_back</span> VOLVER
            </button>
        </div>

        <div class="ads-banner" style="min-height: 260px;">
            <script>
                atOptions = {
                    'key' : '26374dcab12f0a151fa1869a67a237cd',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/26374dcab12f0a151fa1869a67a237cd/invoke.js"></script>
        </div>

        <div class="detalle-container" id="detalleSkinContenedor"></div>
    </div>

    <!-- BANNER FIJO INFERIOR CON LUZ NEÓN -->
    <div class="ads-sticky-footer">
        <script>
            atOptions = {
                'key' : '20622febebc58aceaadca806e30f7816',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/20622febebc58aceaadca806e30f7816/invoke.js"></script>
    </div>

    <iframe id="iframeDescargaOculto" style="display:none;"></iframe>

    <script>
        const SHEET_ID = '1OZvXWbNlcGxyeBU2soZvvSWnVNoguP17AIO20lYD0rE';
        const SHEET_TITLE = 'Hoja 1'; 
        const URL_SHEET = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_TITLE}`;

        let listaSkins = [];
        let categoriaActual = '';

        function irAVista(idVista) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('vista-activa'));
            document.getElementById(idVista).classList.add('vista-activa');
        }

        async function cargarSkinsDesdeSheets() {
            try {
                const respuesta = await fetch(URL_SHEET);
                const textoData = await respuesta.text();
                const jsonLimpio = JSON.parse(textoData.substr(47).slice(0, -2));
                const filas = jsonLimpio.table.rows;

                listaSkins = filas.map(fila => {
                    let imgMuestra = fila.c[2] ? fila.c[2].v : 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?w=600';
                    if (imgMuestra.trim() === "") {
                        imgMuestra = 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?w=600';
                    }

                    return {
                        camion: fila.c[0] ? fila.c[0].v : 'Modelo Base',
                        nombre: fila.c[1] ? fila.c[1].v : 'Skin Premium',
                        fotoMuestra: imgMuestra,
                        linkDescarga: fila.c[5] ? fila.c[5].v : '#', 
                        categoria: fila.c[4] ? fila.c[4].v.trim().toLowerCase() : 'otros' 
                    };
                });
                
                document.getElementById('loading').style.display = 'none';
                irAVista('vistaMenu');
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerText = "ERROR EN EL SISTEMA DE DATOS.";
            }
        }

        cargarSkinsDesdeSheets();

        function mostrarCategoria(catSeleccionada) {
            categoriaActual = catSeleccionada;
            const contenedor = document.getElementById('listaSkinsContenedor');
            contenedor.innerHTML = ''; 
            
            const skinsFiltradas = listaSkins.filter(skin => skin.categoria === catSeleccionada);

            if(skinsFiltradas.length === 0) {
                contenedor.innerHTML = `<div style="text-align:center; padding:50px; color:#aaa; font-family:'Segoe UI',sans-serif; font-size:14px; text-shadow:0 0 5px rgba(0,0,0,0.5);">PRÓXIMAMENTE NUEVAS SKINS PARA ESTE MODELO...</div>`;
                irAVista('vistaCategoria');
                return;
            }

            skinsFiltradas.forEach((skin, index) => {
                const itemHTML = `
                    <div class="skin-item-card" onclick="verDetalleSkin('${catSeleccionada}', ${index})">
                        <div class="thumb-cell">
                            <img src="${skin.fotoMuestra}" class="skin-item-thumb" alt="Thumb">
                        </div>
                        <div class="info-cell">
                            <h4>${skin.nombre}</h4>
                            <p>${skin.camion}</p>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += itemHTML;
            });

            irAVista('vistaCategoria');
        }

        function verDetalleSkin(cat, index) {
            const skinsFiltradas = listaSkins.filter(skin => skin.categoria === cat);
            const skin = skinsFiltradas[index];
            
            document.getElementById('btnVolverCat').onclick = function() {
                mostrarCategoria(cat);
            };

            const contenedor = document.getElementById('detalleSkinContenedor');
            contenedor.innerHTML = `
                <div class="detalle-card">
                    <div class="detalle-img-box">
                        <img src="${skin.fotoMuestra}" alt="Camión">
                    </div>
                    <div class="detalle-info">
                        <h2>${skin.nombre}</h2>
                        <p>COMPATIBLE CON: ${skin.camion}</p>
                        
                        <button class="btn-download" id="btnIniciarFlujoDescarga" onclick="iniciarContador('${skin.linkDescarga}')">
                            DESCARGAR TEXTURA HD
                        </button>

                        <div class="contador-box" id="cajaContador">
                            <div id="cuerpoMensaje">
                                <p class="contador-texto">
                                    Abriendo servidor seguro... Mantén la pestaña abierta.<br>
                                    Cargando enlaces en <span class="contador-numero" id="segundosAviso">6</span> segundos.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            irAVista('vistaDetalle');
        }

        function iniciarContador(urlDescarga) {
            const boton = document.getElementById('btnIniciarFlujoDescarga');
            const cajaContador = document.getElementById('cajaContador');
            const cuerpoMensaje = document.getElementById('cuerpoMensaje');
            
            cuerpoMensaje.innerHTML = `
                <p class="contador-texto">
                    Abriendo servidor seguro... Mantén la pestaña abierta.<br>
                    Cargando enlaces en <span class="contador-numero" id="segundosAviso">6</span> segundos.
                </p>
            `;

            if (boton) {
                boton.style.visibility = 'hidden';
                boton.style.height = '0px';
                boton.style.padding = '0px';
            }
            cajaContador.style.display = 'block'; 
            
            const urlAnuncio = 'https://www.effectivecpmnetwork.com/p2y3r3phx?key=0a9217a59faa68685a1f87c8ae5fc3ea';
            const ventanaAnuncio = window.open(urlAnuncio, '_blank'); 

            let tiempoRestante = 6;

            const intervalo = setInterval(() => {
                tiempoRestante--;
                
                const numeroActualizado = document.getElementById('segundosAviso');
                if (numeroActualizado) {
                    numeroActualizado.innerText = tiempoRestante;
                }

                if (ventanaAnuncio && ventanaAnuncio.closed && tiempoRestante > 0) {
                    clearInterval(intervalo);
                    cuerpoMensaje.innerHTML = `
                        <span class="material-icons" style="color:#ff3333; font-size:32px; text-shadow:0 0 10px #ff3333;">error_outline</span><br>
                        <span style="color:#ff3333; font-weight:bold; font-size:15px;">¡VERIFICACIÓN FALLIDA!</span><br>
                        Debes interactuar con el servidor publicitario por 6 segundos.
                        <br><br>
                        <button class="btn-download" style="margin-top:10px; padding:12px; background: linear-gradient(180deg, #00ff66 0%, #00b347 100%); color:#000; border-bottom:3px solid #008033;" onclick="reintentarFlujo('${urlDescarga}')">REINTENTAR</button>
                    `;
                    return;
                }

                if (tiempoRestante <= 0) {
                    clearInterval(intervalo);
                    
                    document.getElementById('iframeDescargaOculto').src = urlDescarga;

                    cuerpoMensaje.innerHTML = `
                        <span class="material-icons" style="color:#00ff00; font-size:32px; text-shadow:0 0 10px #00ff00;">check_circle</span><br>
                        <p style="color: #00ff00; font-weight: bold; font-size:16px; letter-spacing:1px;">DESCARGA INICIADA</p>
                        El archivo de textura HD se está guardando en tu memoria.
                    `;
                }
            }, 1000);
        }

        function reintentarFlujo(urlDescarga) {
            const cajaContador = document.getElementById('cajaContador');
            cajaContador.style.display = 'none';
            setTimeout(() => {
                iniciarContador(urlDescarga);
            }, 150);
        }
